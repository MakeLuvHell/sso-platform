server:
  port: 9500

spring:
  application:
    name: sso-admin-portal
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 5
      lettuce:
        pool:
          min-idle: 5
          max-idle: 10
          max-active: 20
          max-wait: 5000ms

feign:
  client:
    config:
      default:
        connect-timeout: 10000
        read-timeout: 60000
  httpclient:
    enabled: true
    max-connections: 200
    max-connections-per-route: 50

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.sso.admin: DEBUG
